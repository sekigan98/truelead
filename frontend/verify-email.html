<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activar cuenta — TrueLead</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="auth-layout">
    <section class="auth-card">
      <a class="brand" href="index.html">
        <img src="assets/logo.png" alt="TrueLead" />
        <span>TRUELEAD</span>
      </a>
      <span class="badge" style="margin-top:18px">Activación</span>
      <h1 data-verify-title>Activando cuenta...</h1>
      <p class="muted" data-verify-copy>Estamos verificando tu email para habilitar el panel.</p>
      <div data-message class="notice">Procesando activación...</div>
      <div class="actions" style="margin-top:18px">
        <a class="btn btn-primary btn-full hidden" href="login.html" data-login-link>Entrar al panel</a>
      </div>
    </section>
  </main>
  <script src="js/api.js"></script>
  <script src="js/verify-email.js"></script>
</body>
</html>
