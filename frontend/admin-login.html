
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin interno — TrueLead</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
</head>
<body>
  <main class="auth-layout">
    <section class="auth-card">
      <a class="brand" href="index.html">
        <img src="assets/logo.png" alt="TrueLead" />
        <span>TRUELEAD</span>
      </a>
      <span class="badge" style="margin-top:18px">Backoffice interno</span>
      <h1>Administración TrueLead</h1>
      <p class="muted">Acceso interno para validar cuentas, pagos, planes y vencimientos.</p>
      <div data-message class="notice hidden"></div>

      <form class="form" data-login-form data-login-destination="admin">
        <label>
          <span>Email administrador</span>
          <input type="email" name="email" required placeholder="admin@truelead.local" />
        </label>
        <label>
          <span>Contraseña</span>
          <input type="password" name="password" required placeholder="••••••••" />
        </label>
        <button class="btn btn-primary btn-full" type="submit">Entrar al backoffice</button>
      </form>

      <p class="muted">¿Sos cliente/agencia? <a class="blue-text" href="login.html">Ingresar al panel cliente</a></p>
    </section>
  </main>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
