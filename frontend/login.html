
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel cliente — TrueLead</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
</head>
<body>
  <main class="auth-layout">
    <section class="auth-card">
      <a class="brand" href="index.html">
        <img src="assets/logo.png" alt="TrueLead" />
        <span>TRUELEAD</span>
      </a>
      <h1>Panel cliente/agencia</h1>
      <p class="muted">Entrá al panel para gestionar clientes, proyectos, WhatsApp, leads y Meta CAPI.</p>
      <div data-message class="notice hidden"></div>

      <form class="form" data-login-form data-login-destination="client">
        <label>
          <span>Email</span>
          <input type="email" name="email" required placeholder="tu@email.com" />
        </label>
        <label>
          <span>Contraseña</span>
          <input type="password" name="password" required placeholder="••••••••" />
        </label>
        <button class="btn btn-primary btn-full" type="submit">Ingresar</button>
      </form>

      <p class="muted">¿No tenés cuenta? <a class="blue-text" href="register.html">Crear cuenta</a></p>
      <div class="notice">Si recién te registraste, revisá tu email y activá la cuenta desde el botón de TrueLead.</div>
    </section>
  </main>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
