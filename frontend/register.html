
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — TrueLead</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="auth-layout">
    <section class="auth-card">
      <a class="brand" href="index.html">
        <img src="assets/logo.png" alt="TrueLead" />
        <span>TRUELEAD</span>
      </a>
      <h1>Crear cuenta</h1>
      <p class="muted">La cuenta queda pendiente hasta que un administrador valide el alta/pago.</p>
      <div data-message class="notice hidden"></div>

      <form class="form" data-register-form>
        <label>
          <span>Nombre de agencia</span>
          <input type="text" name="agencyName" required placeholder="Agencia Éxito" />
        </label>
        <label>
          <span>Tu nombre</span>
          <input type="text" name="name" required placeholder="Tomi" />
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" required placeholder="hola@agencia.com" />
        </label>
        <label>
          <span>Contraseña</span>
          <input type="password" name="password" required minlength="8" placeholder="Mínimo 8 caracteres" />
        </label>
        <button class="btn btn-primary btn-full" type="submit">Crear cuenta</button>
      </form>

      <p class="muted">¿Ya tenés cuenta? <a class="blue-text" href="login.html">Ingresar</a></p>
    </section>
  </main>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
