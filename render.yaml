services:
  - type: web
    name: truelead-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_FILE
        value: /var/data/truelead-db.json
      - key: WHATSAPP_SESSION_DIR
        value: /var/data/whatsapp-sessions
      - key: WHATSAPP_AUTO_RESTORE
        value: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_URL
        sync: false
      - key: TRUELEAD_CONTACT_EMAIL
        value: trueleadsite@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_USER
        value: trueleadsite@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: trueleadsite@gmail.com
      - key: CORS_ORIGIN
        sync: false
      - key: TRUELEAD_USD_ARS_RATE
        value: 1200
    disk:
      name: truelead-data
      mountPath: /var/data
      sizeGB: 1
